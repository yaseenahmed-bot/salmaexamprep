<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AQA/OCR Plan">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>AQA/OCR Master Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            padding-top: env(safe-area-inset-top); 
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased text-slate-800 pb-20">

    <header class="pt-10 pb-8 px-4 sm:px-6 lg:px-8 text-center sticky top-0 bg-[#f8fafc]/90 backdrop-blur-md z-20 border-b border-slate-200 shadow-sm">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">
            A-Level Master Plan
        </h1>
        <p class="mt-2 text-sm text-slate-600 font-medium">
            AQA Biology & OCR Chemistry 26-27
        </p>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 mt-8">

        <!-- LIVE EXAM COUNTDOWNS -->
        <div class="mb-12">
            <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400 text-center mb-4">Exam Countdowns</p>
            <div id="countdown-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <div class="mb-6 flex items-center gap-4">
            <div class="h-px bg-slate-300 flex-1"></div>
            <h2 class="text-lg font-bold text-slate-500 uppercase tracking-widest">Phase 1: Content & Testing</h2>
            <div class="h-px bg-slate-300 flex-1"></div>
        </div>

        <div id="phase1-container" class="space-y-5 mb-12"></div>

        <div class="mb-6 flex items-center gap-4 mt-16">
            <div class="h-px bg-indigo-300 flex-1"></div>
            <h2 class="text-lg font-bold text-indigo-500 uppercase tracking-widest flex items-center gap-2">
                <span>Phase 2: Exam Practice</span>
            </h2>
            <div class="h-px bg-indigo-300 flex-1"></div>
        </div>

        <div id="phase2-container" class="space-y-5"></div>

    </main>

    <script>
        // Sept 13 to Apr 4: Alternating AQA Bio and OCR Chem
        const phase1Data = [
            { week: 1, date: 'Sep 13', subject: 'Biology', y2: 'Photosynthesis', y1: 'Carbohydrates & Lipids' },
            { week: 2, date: 'Sep 20', subject: 'Chemistry', y2: 'Equilibria', y1: 'Atoms, Reactions & Amount of Substance' },
            { week: 3, date: 'Sep 27', subject: 'Biology', y2: 'Respiration', y1: 'Proteins & Enzymes' },
            { week: 4, date: 'Oct 4', subject: 'Chemistry', y2: 'Acids, Bases & Buffers', y1: 'Acid-base & Redox Reactions' },
            { week: 5, date: 'Oct 11', subject: 'Biology', y2: 'Energy, Ecosystems & Nutrient Cycles', y1: 'Nucleic Acids, ATP, Water & Ions' },
            { week: 6, date: 'Oct 18', subject: 'Chemistry', y2: 'Thermodynamics', y1: 'Electrons, Bonding & Structure' },
            { week: 7, date: 'Oct 25', subject: 'Biology', y2: 'Response to Stimuli', y1: 'Cell Structure & Microscopes' },
            { week: 8, date: 'Nov 1', subject: 'Chemistry', y2: 'Redox & Electrochemistry', y1: 'Shapes of Molecules & Ions' },
            { week: 9, date: 'Nov 8', subject: 'Biology', y2: 'Nervous Coordination', y1: 'Cell Division, Membranes & Transport' },
            { week: 10, date: 'Nov 15', subject: 'Chemistry', y2: 'Transition Elements', y1: 'Periodicity & Group 2' },
            { week: 11, date: 'Nov 22', subject: 'Biology', y2: 'Skeletal Muscles', y1: 'Cell Recognition, Immune Sys & Vaccines' },
            { week: 12, date: 'Nov 29', subject: 'Chemistry', y2: 'Benzene & Aromatic Compounds', y1: 'The Halogens' },
            { week: 13, date: 'Dec 6', subject: 'Biology', y2: 'Homeostasis', y1: 'Adaptations for & Human Gas Exchange' },
            { week: 14, date: 'Dec 13', subject: 'Chemistry', y2: 'Carbonyl Compounds', y1: 'Enthalpy Changes' },
            { week: 15, date: 'Dec 20', subject: 'Biology', y2: 'Inheritance', y1: 'Digestion & Absorption' },
            { week: 16, date: 'Dec 27', subject: 'Chemistry', y2: 'Carboxylic Acids & Esters', y1: 'Reaction Rates' },
            { week: 17, date: 'Jan 3', subject: 'Biology', y2: 'Populations', y1: 'Mass Transport in Animals' },
            { week: 18, date: 'Jan 10', subject: 'Chemistry', y2: 'Nitrogen Compounds', y1: 'Chemical Equilibrium' },
            { week: 19, date: 'Jan 17', subject: 'Biology', y2: 'Evolution', y1: 'Mass Transport in Plants' },
            { week: 20, date: 'Jan 24', subject: 'Chemistry', y2: 'Optical Isomerism', y1: 'Basic Concepts (Organic)' },
            { week: 21, date: 'Jan 31', subject: 'Biology', y2: 'Populations in Ecosystems', y1: 'DNA, Genes & Protein Synthesis' },
            { week: 22, date: 'Feb 7', subject: 'Chemistry', y2: 'Polymers', y1: 'Alkanes & Alkenes' },
            { week: 23, date: 'Feb 14', subject: 'Biology', y2: 'Genetic Mutations', y1: 'Mutations & Meiosis' },
            { week: 24, date: 'Feb 21', subject: 'Chemistry', y2: 'Extending Carbon Chains', y1: 'Alcohols' },
            { week: 25, date: 'Feb 28', subject: 'Biology', y2: 'Regulation of Gene Expression', y1: 'Genetic Diversity & Adaptation' },
            { week: 26, date: 'Mar 7', subject: 'Chemistry', y2: 'Organic Synthesis', y1: 'Haloalkanes' },
            { week: 27, date: 'Mar 14', subject: 'Biology', y2: 'Using Genome Projects', y1: 'Species & Taxonomy' },
            { week: 28, date: 'Mar 21', subject: 'Chemistry', y2: 'Analytical Techniques', y1: 'Organic Synthesis (Y1)' },
            { week: 29, date: 'Mar 28', subject: 'Biology', y2: 'Gene Technologies', y1: 'Biodiversity' },
            { week: 30, date: 'Apr 4', subject: 'Chemistry', y2: 'Y2 Synoptic Review', y1: 'Analytical Techniques (Y1)' }
        ];

        // Same exact past paper distribution and exam dates
        const phase2Data = [
            { week: 31, dates: "Apr 5 - Apr 11", tasks: ["Chem P1: Specimen, 2017", "Bio P1: Specimen, 2017", "Chem P2: Specimen", "Bio P2: Specimen"] },
            { week: 32, dates: "Apr 12 - Apr 18", tasks: ["Chem P1: 2018, 2019", "Bio P1: 2018, 2019", "Chem P3: Specimen", "Bio P3: Specimen"] },
            { week: 33, dates: "Apr 19 - Apr 25", tasks: ["Chem P1: 2020, 2021", "Bio P1: 2020, 2021", "Chem P2: 2017", "Bio P2: 2017"] },
            { week: 34, dates: "Apr 26 - May 2", tasks: ["Chem P1: 2022, 2023", "Bio P1: 2022, 2023", "Chem P3: 2017", "Bio P3: 2017"] },
            { week: 35, dates: "May 3 - May 9", tasks: ["Chem P1: 2024 (FINAL P1)", "Bio P1: 2024 (FINAL P1)", "Chem P2: 2018, 2019", "Bio P2: 2018, 2019"] },
            { week: 36, dates: "May 10 - May 16", tasks: ["Chem P3: 2018, 2019", "Bio P3: 2018, 2019", "Chem P2: 2020", "Bio P2: 2020"] },
            { week: 37, dates: "May 17 - May 23", tasks: ["Review Chem P1 Mistakes", "Chem P3: 2020", "Bio P3: 2020", "Chem P2: 2021, 2022"] },
            { week: 38, dates: "May 24 - May 30", isExamWeek: true, exam: "🚨 May 28: Chemistry Paper 1", tasks: ["Bio P2: 2021, 2022", "Chem P3: 2021, 2022", "Review Bio P1 Mistakes"] },
            { week: 39, dates: "May 31 - Jun 6", isExamWeek: true, exam: "🚨 Jun 7: Biology Paper 1", tasks: ["Chem P2: 2023, 2024 (FINAL P2)", "Bio P2: 2023, 2024 (FINAL P2)", "Chem P3: 2023"] },
            { week: 40, dates: "Jun 7 - Jun 13", isExamWeek: true, exam: "🚨 Jun 10: Chemistry Paper 2", tasks: ["Bio P3: 2023", "Chem P3: 2024 (FINAL P3)", "Review Chem P2 & Bio P2 Mistakes"] },
            { week: 41, dates: "Jun 14 - Jun 20", isExamWeek: true, exam: "🚨 Jun 14: Bio P2 | Jun 17: Chem P3 | Jun 18: Bio P3", tasks: ["Bio P3: 2024 (FINAL P3)", "Final Light Review"] }
        ];

        function saveCheckboxState(checkbox) {
            localStorage.setItem(checkbox.id, checkbox.checked);
        }

        function restoreCheckboxStates() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                const savedState = localStorage.getItem(checkbox.id);
                if (savedState === "true") {
                    checkbox.checked = true;
                }
                
                checkbox.addEventListener('change', function() {
                    saveCheckboxState(this);
                });
            });
        }

        const container1 = document.getElementById('phase1-container');
        phase1Data.forEach((item) => {
            const isBio = item.subject === 'Biology';
            const themeColor = isBio ? 'emerald' : 'indigo';
            
            // Unique IDs using the new 30-week mapping
            const idY2 = `p1-w${item.week}-y2`;
            const idY1 = `p1-w${item.week}-y1`;

            const cardHTML = `
                <div class="glass-card rounded-2xl shadow-sm border border-slate-200/70 p-4 sm:p-5 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-${themeColor}-400"></div>
                    
                    <div class="flex justify-between items-center mb-4 ml-2">
                        <div class="flex items-center space-x-2">
                            <span class="text-sm font-bold text-slate-800">Wk ${item.week}</span>
                            <span class="text-xs font-semibold text-slate-400">&bull;</span>
                            <span class="text-sm font-medium text-slate-500">${item.date}</span>
                        </div>
                        <span class="text-xs font-bold uppercase tracking-wider text-${themeColor}-600 bg-${themeColor}-50 px-2 py-1 rounded-md">
                            ${item.subject}
                        </span>
                    </div>

                    <div class="ml-2 space-y-3">
                        <label class="flex items-start cursor-pointer group/task">
                            <input type="checkbox" id="${idY2}" class="mt-1 w-4 h-4 text-${themeColor}-600 rounded border-slate-300 focus:ring-${themeColor}-500">
                            <div class="ml-3">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Y2 Lesson</span>
                                <span class="text-sm font-semibold text-slate-800 group-hover/task:text-${themeColor}-700 transition-colors">${item.y2}</span>
                            </div>
                        </label>
                        
                        <div class="w-full h-px bg-slate-100 ml-7"></div>

                        <label class="flex items-start cursor-pointer group/task">
                            <input type="checkbox" id="${idY1}" class="mt-1 w-4 h-4 text-${themeColor}-600 rounded border-slate-300 focus:ring-${themeColor}-500">
                            <div class="ml-3">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-0.5">Y1 Topic Test</span>
                                <span class="text-sm font-semibold text-slate-700 group-hover/task:text-${themeColor}-700 transition-colors">${item.y1}</span>
                            </div>
                        </label>
                    </div>
                </div>
            `;
            container1.innerHTML += cardHTML;
        });

        const container2 = document.getElementById('phase2-container');
        phase2Data.forEach((item) => {
            const isExam = item.isExamWeek;
            
            let tasksHtml = item.tasks.map((task, taskIndex) => {
                const taskId = `p2-w${item.week}-t${taskIndex}`;
                return `
                    <label class="flex items-start mb-2.5 cursor-pointer group/task">
                        <input type="checkbox" id="${taskId}" class="mt-0.5 w-4 h-4 text-slate-800 rounded border-slate-300 focus:ring-slate-500">
                        <span class="ml-3 text-sm font-medium text-slate-600 group-hover/task:text-slate-900 transition-colors">${task}</span>
                    </label>
                `;
            }).join('');

            const examBanner = isExam ? `
                <div class="mt-4 mb-3 bg-rose-50 text-rose-700 text-xs font-bold px-3 py-2.5 rounded-lg border border-rose-100 uppercase tracking-wide flex items-center">
                    ${item.exam}
                </div>
            ` : '';

            const cardHTML = `
                <div class="glass-card rounded-2xl shadow-sm border ${isExam ? 'border-rose-200 shadow-rose-100/50' : 'border-slate-200/70'} p-4 sm:p-5">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-slate-800">Week ${item.week}</h3>
                        <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md">${item.dates}</span>
                    </div>
                    ${examBanner}
                    <div class="mt-4">
                        ${tasksHtml}
                    </div>
                </div>
            `;
            container2.innerHTML += cardHTML;
        });

        // Run this immediately after rendering to bind events
        restoreCheckboxStates();

        // ===== LIVE EXAM COUNTDOWNS =====
        // AM sittings = 09:00, PM sittings = 13:30 (per AQA timetable)
        // color matches the page theme: Biology = emerald, Chemistry = indigo
        const examDates = [
            { name: 'Chemistry Paper 1', code: '7405/1', date: new Date('2027-05-28T09:00:00'), session: 'AM', color: 'indigo'  },
            { name: 'Biology Paper 1',   code: '7402/1', date: new Date('2027-06-07T13:30:00'), session: 'PM', color: 'emerald' },
            { name: 'Chemistry Paper 2', code: '7405/2', date: new Date('2027-06-10T09:00:00'), session: 'AM', color: 'indigo'  },
            { name: 'Biology Paper 2',   code: '7402/2', date: new Date('2027-06-14T13:30:00'), session: 'PM', color: 'emerald' },
            { name: 'Chemistry Paper 3', code: '7405/3', date: new Date('2027-06-17T09:00:00'), session: 'AM', color: 'indigo'  },
            { name: 'Biology Paper 3',   code: '7402/3', date: new Date('2027-06-18T09:00:00'), session: 'AM', color: 'emerald' }
        ];

        const fmtDate = d => d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });

        // Build the six timer cards once
        const grid = document.getElementById('countdown-grid');
        examDates.forEach((exam, i) => {
            const unit = (id, label) => `
                <div class="flex flex-col items-center">
                    <span id="cd${i}-${id}" class="text-xl sm:text-2xl font-extrabold tabular-nums leading-none text-slate-800">0</span>
                    <span class="text-[9px] font-semibold uppercase tracking-widest text-slate-400 mt-1">${label}</span>
                </div>`;
            const sep = `<span class="text-xl sm:text-2xl font-extrabold text-slate-300 leading-none">:</span>`;

            grid.innerHTML += `
                <div id="cd${i}-card" class="glass-card rounded-2xl shadow-sm border border-slate-200/70 p-4 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-${exam.color}-400"></div>
                    <div class="ml-2">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm font-bold text-slate-800">${exam.name}</span>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-${exam.color}-600 bg-${exam.color}-50 px-2 py-0.5 rounded-md">${exam.code}</span>
                        </div>
                        <div id="cd${i}-timer" class="flex items-end gap-2 sm:gap-3">
                            ${unit('days','Days')} ${sep} ${unit('hrs','Hrs')} ${sep} ${unit('mins','Mins')} ${sep} ${unit('secs','Secs')}
                        </div>
                        <p class="text-[11px] font-medium text-slate-500 mt-3">${fmtDate(exam.date)} &bull; ${exam.session}</p>
                    </div>
                </div>`;
        });

        // Cache nodes for fast updates
        const timers = examDates.map((exam, i) => ({
            exam,
            card:  document.getElementById(`cd${i}-card`),
            timer: document.getElementById(`cd${i}-timer`),
            days:  document.getElementById(`cd${i}-days`),
            hrs:   document.getElementById(`cd${i}-hrs`),
            mins:  document.getElementById(`cd${i}-mins`),
            secs:  document.getElementById(`cd${i}-secs`)
        }));

        function updateCountdowns() {
            const now = new Date();
            timers.forEach(t => {
                let diff = Math.floor((t.exam.date - now) / 1000);

                if (diff <= 0) {
                    // Exam has passed — show a completed state
                    if (!t.card.dataset.done) {
                        t.timer.innerHTML = `<span class="text-base font-bold text-${t.exam.color}-600">Completed &#10003;</span>`;
                        t.card.classList.add('opacity-60');
                        t.card.dataset.done = 'true';
                    }
                    return;
                }

                const days = Math.floor(diff / 86400); diff -= days * 86400;
                const hrs  = Math.floor(diff / 3600);  diff -= hrs * 3600;
                const mins = Math.floor(diff / 60);
                const secs = diff - mins * 60;

                t.days.textContent = days;
                t.hrs.textContent  = String(hrs).padStart(2, '0');
                t.mins.textContent = String(mins).padStart(2, '0');
                t.secs.textContent = String(secs).padStart(2, '0');
            });
        }

        updateCountdowns();
        setInterval(updateCountdowns, 1000);

    </script>
</body>
</html>
